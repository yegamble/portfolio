      - generic [ref=e100]:
        - paragraph [ref=e101]: I started writing code at Central Washington University in 2013, where I served as Student Government President and earned the Boeing Scholarship. My path took me across the Pacific to New Zealand — first for a degree at the University of Auckland, then into the tech industry as a software engineer building systems that would reach millions of users.
        - paragraph [ref=e102]:
          - text: At
          - link "realestate.co.nz" [ref=e103] [cursor=pointer]:
            - /url: https://www.realestate.co.nz
          - text: ", I became a key engineer on New Zealand’s most established real estate portal. I shipped industry-first features — instant price change alerts and transparent price history — that competitors copied months later. I designed a serverless notification system on AWS Lambda integrated with Braze that delivered listing alerts to every user on the platform, and led company-wide workshops on serverless architecture and observability."
        - paragraph [ref=e104]: I’m building Vidra — an open-source, PeerTube-compatible video streaming platform in Go — split across vidra-core (streaming, transcoding, P2P delivery) and vidra-user (identity and federation). It federates with PeerTube and Mastodon via ActivityPub and with Bluesky via ATProto, so creators reach audiences across networks without vendor lock-in. Bandwidth egress for a small-to-medium instance can run anywhere from hundreds to tens of thousands of dollars per month; I’ve engineered it to near-zero via Backblaze B2 and Cloudflare’s Bandwidth Alliance. I care about scalable systems, infrastructure automation, and the open web.
