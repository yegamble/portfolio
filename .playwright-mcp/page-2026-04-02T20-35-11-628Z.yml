          - generic [ref=e40]: התחלתי לכתוב קוד באוניברסיטת Central Washington ב-2013, שם שימשתי כנשיא אגודת הסטודנטים וזכיתי במלגת בואינג. הדרך שלי לקחה אותי מעבר לאוקיינוס השקט לניו זילנד — קודם לתואר באוניברסיטת אוקלנד, ואחר כך לתעשיית הטכנולוגיה שם בניית תוכנות שהגיעו למיליוני משתמשים.
        - paragraph [ref=e41]:
          - text: ב-
          - link "realestate.co.nz" [ref=e42] [cursor=pointer]:
            - /url: https://www.realestate.co.nz
          - text: ", הפכתי למהנדס מפתח בפורטל הנדל\"ן הוותיק ביותר של ניו זילנד. השקתי תכונות ראשונות בתעשייה — התראות מיידיות על שינויי מחירים והיסטוריית מחירים שקופה — שמתחרים העתיקו חודשים אחר כך. תכננתי מערכת התראות serverless על AWS Lambda בשילוב עם Braze שסיפקה התראות נכסים לכל משתמש בפלטפורמה, והובלתי סדנאות בכל החברה על ארכיטקטורת serverless ו-observability."
        - paragraph [ref=e43]:
          - generic [ref=e44]: כעת חזרתי לניו יורק, אני בונה מערכת סטרימינג וידאו בקוד פתוח ב-Go — מיישמת פדרציית ActivityPub ו-ATProto לשיתוף תוכן מבוזר, ומקטינה עלויות רוחב פס לכמעט $0 דרך שילוב Cloudflare CDN ו-Backblaze B2. אכפת לי מערכות סקיילביליות, אוטומציית תשתיות, והאינטרנט הפתוח.
